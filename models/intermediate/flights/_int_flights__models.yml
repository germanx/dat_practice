models:
  - name: fct_bookings
    description: Bookings facts
    docs:
      show: true
      node_color: red
    latest_version: 1
    versions:
      - v: 1
    config:
      contract: { enforced: true }
    meta:
      owner: "german@bk.ru"
      contact_tg: germanx
      status: in_dev

    columns:
      - name: book_ref
        data_type: bpchar(6)
        constraints:
          - type: not_null
      - name: book_date
        data_type: timestamptz
      - name: total_amount
        data_type: numeric(10,2)
        constraints:
          - type: check
            expression: "total_amount > 0"
        tests:
          - not_null
        meta:
          owner: finance_team
        quote: false
