sources:
  - name: demo_src
    description: Data from Ext DB
    # database: dwh_flight
    # schema: demo_src
    tables:
      - name: aircrafts
        description: >
          Aircrft models
          other text
        columns:
          - name: aircraft_code
            description: code
            test:
              - not_null
              - unique
          - name: model
            description: model
          - name: "range"
            description: range
        freshness: null
      - name: airports
        description: Airports
      - name: seats
        description: Seats in airplanes
      - name: bookings
        columns:
          - name: book_ref
          - name: book_date
          - name: total_amount
        freshness:
          warn_after:
            count: 600000
            period: hour
          error_after:
            count: 10000
            period: day
          filter: current_timestamp::date - book_date::date < 30000
        loaded_at_field: book_date::timestamp
